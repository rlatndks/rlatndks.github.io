---
layout: default
---
<div class="post-container">
  <h1>{{ page.title }}</h1>
  
  <article class="post-content">
    {{ content }}
  </article>

  <hr>
  <a href="/">목록으로 돌아가기</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll('pre').forEach((codeBlock) => {
    // 버튼 생성
    const button = document.createElement('button');
    button.className = 'copy-button';
    button.type = 'button';
    button.innerText = 'Copy';

    // 버튼 클릭 이벤트
    button.addEventListener('click', () => {
      const code = codeBlock.innerText;
      navigator.clipboard.writeText(code).then(() => {
        button.innerText = 'Copied!';
        button.classList.add('copied');
        setTimeout(() => { 
          button.innerText = 'Copy';
          button.classList.remove('copied');
        }, 2000);
      });
    });

    // 코드 블록을 감싸는 컨테이너 생성 (버튼 위치 고정용)
    const wrapper = document.createElement('div');
    wrapper.className = 'code-wrapper';
    codeBlock.parentNode.insertBefore(wrapper, codeBlock);
    wrapper.appendChild(codeBlock);
    wrapper.appendChild(button);
  });
});
</script>

<style>
  .post-container { max-width: 800px; margin: 0 auto; padding: 20px; }
  .code-wrapper { position: relative; margin: 20px 0; }
  
  pre { 
    background: #f4f4f4; 
    padding: 15px; 
    border-radius: 8px; 
    overflow-x: auto; 
    border: 1px solid #ddd;
    line-height: 1.5;
  }

  .copy-button {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 5px 10px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  .copy-button:hover { background: #eee; }
  .copy-button.copied { background: #4CAF50; color: white; border-color: #4CAF50; }
</style>
