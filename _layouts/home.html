---
layout: default
---

<div class="home-custom">
  <div class="hero-section">
    <h1>{{ site.description }}</h1>
    <p>효율적인 작업을 위한 마야 및 파이썬 스크립트 모음입니다.</p>
  </div>

  <div class="script-list-container">
    <h2 class="list-title">스크립트 목록</h2>
    <ul class="script-list">
      {% for post in site.posts %}
        <li>
          <span class="post-date">{{ post.date | date: "%b %d, %Y" }}</span>
          <a class="post-link" href="{{ post.url | relative_url }}">
            {{ post.title | escape }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
</div>

<style>
  .home-custom { padding: 20px 0; }
  .hero-section {
    background: #f8f9fa;
    padding: 40px 20px;
    border-radius: 12px;
    margin-bottom: 40px;
    text-align: center;
  }
  .hero-section h1 { font-size: 1.8rem; color: #333; margin-bottom: 10px; }
  .hero-section p { color: #666; font-size: 1rem; }

  .list-title {
    font-size: 1.4rem;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }
  .script-list { list-style: none; padding: 0; }
  .script-list li {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
  }
  .post-date {
    font-size: 0.9rem;
    color: #999;
    width: 120px;
    flex-shrink: 0;
  }
  .post-link {
    font-size: 1.1rem;
    color: #007bff;
    text-decoration: none;
    font-weight: 500;
  }
  .post-link:hover { text-decoration: underline; color: #0056b3; }
</style>
